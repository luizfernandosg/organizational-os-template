# dashboard.yaml — Controls what /initialize shows
# Toggle sections on/off, reorder, and customize without deleting any files.
#
# Sections render in the order listed below.
# Set `show: false` to hide a section. Set `show: true` (or omit) to show it.
# Some sections accept extra options for fine-tuning.

schema_version: "2.0"

# ─── Dashboard Sections ──────────────────────────────────────────────────────

sections:

  header:
    show: true
    # style: "ascii" | "compact"
    #   ascii   → full block-letter banner (default)
    #   compact → single-line org name + status bar
    style: ascii

  projects:
    show: true
    # max: how many projects to show (null = all)
    max: null
    # stages: which IDEA stages to include (null = all)
    # stages: [idea, develop, execute]
    stages: null

  tasks:
    show: true
    # max: how many tasks per urgency tier (null = all)
    max: null
    # show_completed: include recently completed tasks
    show_completed: true

  calendar:
    show: true
    # days: how many days to show (7 = this week, 14 = two weeks)
    days: 7

  funding:
    show: true
    # horizon_days: only show opportunities with deadlines within this window
    horizon_days: 30

  context:
    show: true
    # max_entries: how many recent memory entries to show
    max_entries: 3

  plans:
    show: true
    # Show active + next N queued plans from docs/agent-plans/QUEUE.md
    queued_preview: 2

  apps:
    show: true

  cheatsheet:
    show: true

  federation:
    show: true

  prompt:
    show: true
    # suggestions: how many contextual suggestions to generate
    suggestions: 3

# ─── Custom Sections ─────────────────────────────────────────────────────────
